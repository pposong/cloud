name: CI/CD Pipeline          # 워크플로우 이름

on:                           # 트리거: 언제 실행할지
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest    # GitHub Actions Runner 환경 (Ubuntu 서버)
    steps:
      # Step 1: GitHub에서 코드를 Runner 서버로 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: 스프링 빌드를 위한 Java 17 설치
      - name: Java 17 설정
        uses: actions/setup-java@v3
        with:                      # Action에 전달할 옵션
          java-version: '17'
          distribution: 'corretto' # Amazon Corretto Java 배포판 사용

      # Step 3: Gradle 빌드 (gradlew 실행 권한 부여 후 JAR 빌드)
      - name: Gradle 빌드
        run: |
          chmod +x ./gradlew    # gradlew 파일에 실행 권한 부여 (Linux에서 필수)
          ./gradlew bootJar

      # Step 4: Docker Hub 로그인 (이미지 Push 권한 획득)
      - name: Docker Hub 로그인
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_PASSWORD }}

      # Step 5: JAR 파일을 포함한 Docker 이미지 빌드 (EC2 아키텍처에 맞게 linux/amd64 지정)
      - name: Docker 이미지 빌드
        run: docker build --platform linux/arm64 -t pposong/cloud:latest . # --platform linux/amd64 → EC2가 amd64 아키텍처이므로 맞춰서 빌드해라

      # Step 6: 빌드한 이미지를 Docker Hub에 업로드
      - name: Docker Hub Push
        run: docker push pposong/cloud:latest

      # Step 7: AWS 인증 설정
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # Step 8: ASG 인스턴스 교체 (최신 Docker 이미지로 자동 재배포)
      - name: Instance Refresh 시작
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name project2-asg \
            --preferences MinHealthyPercentage=50   
